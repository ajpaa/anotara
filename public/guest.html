<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ano Tara? | Guest Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="guest-body">

    <nav class="topbar">
        <div class="logo">Ano Tara?</div>
        <div class="nav-icons">
            <a href="/guest" title="Home"><i class="fa-solid fa-house"></i></a>
            <!--<a href="#" title="Search"><i class="fa-solid fa-magnifying-glass"></i></a>-->
            <a href="/favorites" title="Favorites"><i class="fa-solid fa-heart"></i></a>
            <a href="/profile" title="Profile"><i class="fa-solid fa-circle-user"></i></a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Make your drawings come true!</h1>
            <p>Book vacation stays at lowest price</p>
        </div>
        
        <div class="glass-search">
            <div class="s-item">
                <label>Search Property</label>
                <input type="text" id="name" placeholder="Search for a property">
            </div>
            <div class="s-item">
                <label>Check in</label>
                <input type="date" id="checkinDate" placeholder="Add Check in date">
            </div>
            <div class="s-item">
                <label>Check out</label>
                <input type="date" id="checkoutDate" placeholder="Add Check out date">
            </div>
            <button class="search-circle" id="search-circle"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </header>

    <section class="filter-bar">
        <div class="filter-group">
            <i class="fa-solid fa-location-dot"></i>
            <select id="filter-location">
                <option value="">Location (NCR)</option>
                <option value="Caloocan">Caloocan</option>
                <option value="Las Piñas">Las Piñas</option>
                <option value="Makati">Makati</option>
                <option value="Malabon">Malabon</option>
                <option value="Mandaluyong">Mandaluyong</option>
                <option value="Manila">Manila</option>
                <option value="Marikina">Marikina</option>
                <option value="Muntinlupa">Muntinlupa</option>
                <option value="Navotas">Navotas</option>
                <option value="Paranaque">Parañaque</option>
                <option value="Pasay">Pasay</option>
                <option value="Pasig">Pasig</option>
                <option value="Quezon">Quezon City</option>
                <option value="San Juan">San Juan</option>
                <option value="Taguig">Taguig</option>
                <option value="Valenzuela">Valenzuela</option>
            </select>
        </div>
        <div class="filter-group">
            <i class="fa-solid fa-hotel"></i>
            <select id="filter-type">
                <option value="">All Types</option>
                <option value="House">House</option>
                <option value="Condominium">Condominium</option>
                <option value="Apartment">Apartment</option>
                <option value="Dorm">Dorm</option>
                <option value="Villa">Villa</option>
            </select>
        </div>
        <div class="filter-group">
            <i class="fa-solid fa-tags"></i>
            <select id="sortby-price">
                <option value="">Sort by Price</option>
                <option value="price_asc">Sort by Ascending Price</option>
                <option value="price_desc">Sort by Descending Price</option>
            </select>
        </div>
    </section>

    <main class="content-area">
        <h2 class="section-title">Popular Bookings</h2>
        <div id="listings-grid" class="listings-grid">
            <p class="empty-msg">Listings loading...</p>
        </div>
    </main>

    <script src="js/guest.js"></script>

</body>
</html>
