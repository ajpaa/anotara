<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Details | Ano Tara?</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body class="details-page">

<nav class="topbar">
    <div class="logo" onclick="window.location.href='guest.html'">Ano Tara?</div>
    <div class="nav-icons">
        <a href="guest.html"><i class="fa-solid fa-house"></i></a>
        <a href="guest.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="favorites.html"><i class="fa-solid fa-heart"></i></a>
        <a href="profile.html"><i class="fa-solid fa-circle-user"></i></a>
    </div>
</nav>

    <main class="details-container">
        <header class="details-header">
            <h1 id="det-title">Loading property...</h1>
            <div class="header-meta">
                <span id="det-loc"></span>
                <span class="rating"><i class="fa-solid fa-star"></i> 4.9 (New)</span>
            </div>
        </header>

        <div class="details-grid">
            <section class="content-main">
                <div class="image-gallery">
                    <img id="det-img" src="https://placehold.co/800x500?text=Loading+Image" alt="Property">
                </div>

                <div class="description-section">
                    <h2>About this <span id="det-type" style="color: var(--primary-teal);">stay</span></h2>
                    <p id="det-desc">Fetching latest information from host...</p>
                </div>

                <div class="amenities">
                    <h3>What this place offers</h3>
                    <div class="amenity-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <span><i class="fa-solid fa-wifi"></i> Fast WiFi</span>
                        <span><i class="fa-solid fa-car"></i> Free parking</span>
                        <span><i class="fa-solid fa-kitchen-set"></i> Kitchen</span>
                        <span><i class="fa-solid fa-snowflake"></i> AC</span>
                    </div>
                </div>
            </section>

            <aside class="booking-sidebar">
                <div class="booking-card">
                    <div class="price-header">
                        <span id="det-price">₱0</span> <small>/ night</small>
                    </div>
                    
                    <form id="detailsBookingForm">
                        <div class="input-group">
                            <label>Check-in / Check-out</label>
                            <div class="date-inputs">
                                <input type="date" id="startDate" required>
                                <input type="date" id="endDate" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Guest Name</label>
                            <input type="text" id="guestName" placeholder="Full name for booking" required>
                        </div>
                        <button type="submit" class="btn-reserve">Reserve Now</button>
                    </form>
                    
                    <p class="no-charge-text">No payment required yet</p>
                    <div class="total-row">
                        <span>Total stay cost</span>
                        <strong id="total-price">₱0</strong>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="js/details.js"></script>
</body>
</html>
