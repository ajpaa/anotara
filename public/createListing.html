<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Listing</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">
        <h1>Create Listing</h1>

        <form id="listingForm">

            <div class="row g-3">

                <div class="col-6">
                    <input type="text" id="firstName" class="form-control" placeholder="First name">
                </div>

                <div class="col-6">
                    <input type="text" id="lastName" class="form-control" placeholder="Last name">
                </div>

                <div class="col-6">
                    <input type="text" id="hostId" class="form-control" placeholder="Host Id">
                </div>

                <div class="col-6">
                    <input type="text" id="contact" class="form-control" placeholder="Contact Number">
                </div>

                <div class="col-6">
                    <input type="text" id="location" class="form-control" placeholder="Location">
                </div>

                <div class="col-6">
                    <input type="number" id="price" class="form-control" placeholder="Price">
                </div>

                <div class="col-md-12">
                    <input type="file" id="image" class="form-control" accept="image/*">
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100">Submit
                    </button>
                </div>

            </div>

        </form>
    </div>

    <script src="/js/createListing.js"></script>

</body>
</html>
