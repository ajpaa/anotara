<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-4">
         <h1>Rent a car</h1>

        <div>
            Search: 
            <input type="text" id="searchBar" placeholder="Search by title..."> 
            <button onclick="searchByTitle()" id="searchBar"> Search </button>

        </div>
        
        <br>
        <div id="filter-group">
            Filter by: 
            <br>

            <label for="fruit">Type</label>
            <input onchange="filterCategory('Task')" type="text" id="task" name="category" placeholder="sedan">

            <label for="veg">Location</label>
            <input onchange="filterCategory('Service')" type="text" id="service" name="category" placeholder="Manila">

            <label for="veg">Price</label>
            <input onchange="filterCategory('Selling')" type="text" id="selling" name="category" placeholder="1,000">
        </div>
        <div id="listingsContainer" class="row g-3"></div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/js/browseListing.js"></script>


</body>

</html>
