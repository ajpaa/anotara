<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ano Tara? | Host Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="guest-body">

    <nav class="topbar">
        <div class="logo" onclick="location.href='/host'">Ano Tara?</div>
        <div class="nav-icons">
            <a href="/host" title="Home"><i class="fa-solid fa-house"></i></a>
            <a href="/manageListings" title="Home"><i class="fa-solid fa-gauge"></i></a>
            <!-- <a href="#" title="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
            <a href="favorites.html" title="Favorites"><i class="fa-solid fa-heart"></i></a> -->
            <a href="/host-profile" title="Profile"><i class="fa-solid fa-circle-user"></i></a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Manage your Listing!</h1>
            <p>Create, update details, or clear listings off</p>
        </div>        
    </header>

    <main class="content-area">
        <div class="content-header">
            <h2 class="section-title">Active Accommodations</h2>
            <button class="view-more-teal" onclick="toggleForm()">+ Create New Listing</button>
        </div>

        <div id="listing-form-container">
            <h3 id="form-title">Add an Accommodation</h3>
            
            <form id="listing-form">
                <input type="hidden" id="form-listing-id">
                <div class="input-group-v2"><input type="text" id="form-name" placeholder="Property Title (e.g., Beachfront Condo)" required></div>
                <div class="input-group-v2"><input type="number" id="form-price" placeholder="Price per night (₱)" required></div>
                
                <div class="input-group-v2">
                    <select id="form-location" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: white;">
                        <option value="" disabled selected>Select Location City</option>
                        <option value="Caloocan">Caloocan</option>
                        <option value="Las Piñas">Las Piñas</option>
                        <option value="Makati">Makati</option>
                        <option value="Malabon">Malabon</option>
                        <option value="Mandaluyong">Mandaluyong</option>
                        <option value="Manila">Manila</option>  
                        <option value="Marikina">Marikina</option>
                        <option value="Muntinlupa">Muntinlupa</option>
                        <option value="Navotas">Navotas</option>
                        <option value="Parañaque">Parañaque</option>
                        <option value="Pasay">Pasay</option>
                        <option value="Pasig">Pasig</option>    
                        <option value="Pateros">Pateros</option>                  
                        <option value="Quezon City">Quezon City</option>
                        <option value="San Juan">San Juan</option>
                        <option value="Taguig">Taguig</option>
                        <option value="Valenzuela">Valenzuela</option>
                    </select>
                </div>
               <div class="input-group-v2">
                    <input type="tel" id="form-contact" placeholder="Contact number (e.g., 09123456789)" required>
                </div>    

                <div class="input-group-v2">
                    <select id="form-type" required>
                        <option value="" disabled selected>Select Property Type</option>
                        <option value="Villa">Villa</option>
                        <option value="Apartment">Apartment</option>
                        <option value="House">House</option>
                        <option value="Condominium">Condominium </option>
                        <option value="Dorm">Dorm</option>

                    </select>
                </div>
                <div class="input-group-v2"><input type="url" id="form-image" placeholder="Image URL (e.g., https://images.unsplash.com/photo-...)"></div>
                <div class="input-group-v2"><input type="text" id="form-desc" placeholder="Write an enticing summary description..."></div>
                <button type="submit" class="teal-submit-btn">Save Real Estate Data Entry</button>
                <button type="button" class="cancel-btn" onclick="handleCancel()" >
                    Cancel
                </button>
            </form>
        </div>

        <div id="listings-grid" class="listings-grid">
            </div>
    </main>

    <script src="js/hostListing.js"></script>
    <div id="status-modal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="status-modal-title">Notification</h3>
        <p id="status-modal-message">Message text goes here.</p>
        <div class="modal-actions">
            <button class="modal-btn confirm-btn" onclick="closeStatusModal()">OK</button>
        </div>
    </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Are you sure?</h3>
            <p id="confirm-modal-message">Do you want to proceed with this action?</p>
            <div class="modal-actions">
                <button id="confirm-modal-yes" class="modal-btn danger-btn">Yes</button>
                <button class="modal-btn cancel-btn" onclick="closeConfirmModal()">No</button>
            </div>
        </div>
    </div>

</body>
</html>
